<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NERVE DEMO</title>
    <style>
      :root { --pitch:#070d18; --volt:#38bdf8; }
      * { box-sizing:border-box; }
      html,body { margin:0; min-height:100%; background:var(--pitch); color:#fff; font-family:Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif; }
      main { min-height:100dvh; display:flex; flex-direction:column; justify-content:center; max-width:56rem; margin:0 auto; padding:2.5rem 1rem; }
      h1 { margin:0; font-size:clamp(2.25rem,6vw,3rem); letter-spacing:.04em; font-weight:400; }
      .player { margin-top:1.5rem; overflow:hidden; border-radius:.75rem; border:1px solid rgba(255,255,255,.1); background:#000; box-shadow:0 30px 80px rgba(0,0,0,.55); }
      video { display:block; width:100%; aspect-ratio:16/9; background:#000; }
      a { display:inline-block; margin-top:1.25rem; padding:.85rem 1.25rem; border-radius:.55rem 1.2rem; background:var(--volt); color:var(--pitch); text-decoration:none; font-size:1.15rem; letter-spacing:.03em; text-transform:uppercase; }
      a:hover { filter:brightness(1.08); }
    </style>
  </head>
  <body>
    <main>
      <h1>NERVE DEMO</h1>
      <div class="player">
        <video controls playsinline preload="metadata" poster="poster.jpg" controlslist="nodownload">
          <source src="hophop.mp4" type="video/mp4" />
        </video>
      </div>
      <a href="https://nerveit.xyz">Open the game</a>
    </main>
  </body>
</html>
